services:
  - type: web
    name: autobott
    env: python
    plan: starter
    buildCommand: pip install -r autotrader/requirements.txt
    startCommand: python -u autotrader/render_service.py
    healthCheckPath: /healthz
    disk:
      name: autotrader-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_LIVE_API_KEY
        sync: false
      - key: ALPACA_LIVE_SECRET_KEY
        sync: false
      - key: DATA_DIR
        value: /data
